worker_processes  1;

events {
	worker_connections  256;
}

http {
	include /etc/nginx/mime.types;

	# Performance: zero-copy file serving
	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;

	# Memory: reduce default buffer sizes for static-only workload
	client_max_body_size 1k;
	client_body_buffer_size 1k;
	client_header_buffer_size 1k;
	large_client_header_buffers 2 1k;

	# Memory: free sockets from timed-out connections
	reset_timedout_connection on;
	keepalive_timeout 30;

	# Security: hide nginx version
	server_tokens off;

	# Performance: cache file descriptors
	open_file_cache max=200 inactive=60s;
	open_file_cache_valid 60s;
	open_file_cache_min_uses 2;
	open_file_cache_errors on;

	# Serve pre-compressed files (built at Docker image time)
	gzip_static on;

	# Runtime gzip as fallback (mainly for proxied PostHog responses)
	gzip on;
	gzip_min_length 1000;
	gzip_proxied expired no-cache no-store private auth;
	gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

	server {
		listen 8080 default_server;
		server_name  _;

		root   /usr/share/nginx/html;
		index  index.html index.htm;

		# Security headers
		add_header X-Frame-Options "SAMEORIGIN";
		add_header X-XSS-Protection "1; mode=block";
		add_header X-Content-Type-Options "nosniff";
		add_header Referrer-Policy "strict-origin-when-cross-origin";

		error_page 404 @localized_404;
		error_page 500 502 503 504 @localized_50x;

		location @localized_404 {
			rewrite ^/en(?:/.*)?$ /en/errors/404 last;
			rewrite ^ /errors/404 last;
		}

		location @localized_50x {
			rewrite ^/en(?:/.*)?$ /en/errors/50x last;
			rewrite ^ /errors/50x last;
		}

		location = /404.html {
				root /usr/share/nginx/html;
				internal;
		}

		# all assets contain hash in filename, cache forever
		location ^~ /_astro/ {
			add_header X-Frame-Options "SAMEORIGIN" always;
			add_header X-XSS-Protection "1; mode=block" always;
			add_header X-Content-Type-Options "nosniff" always;
			add_header Referrer-Policy "strict-origin-when-cross-origin" always;
			add_header Cache-Control "public, max-age=31536000, s-maxage=31536000, immutable";
			try_files $uri =404;
			access_log off;
		}

		# Cache other static assets
		location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
			add_header X-Frame-Options "SAMEORIGIN" always;
			add_header X-XSS-Protection "1; mode=block" always;
			add_header X-Content-Type-Options "nosniff" always;
			add_header Referrer-Policy "strict-origin-when-cross-origin" always;
			expires 30d;
			add_header Cache-Control "public, no-transform";
		}

		# PostHog Proxy (EU)
		location ^~ /hog/ {
			client_max_body_size 20m;
			proxy_pass https://eu.i.posthog.com/;
			proxy_set_header Host "eu.i.posthog.com";
			proxy_ssl_server_name on;
			proxy_buffer_size 4k;
			proxy_buffers 4 4k;
			proxy_hide_header 'Access-Control-Allow-Origin';
			add_header X-Frame-Options "SAMEORIGIN" always;
			add_header X-Content-Type-Options "nosniff" always;
			add_header 'Access-Control-Allow-Origin' '*' always;
		}

		# PostHog Proxy (EU) Static Assets
		location ^~ /hog/static/ {
			proxy_pass https://eu-assets.i.posthog.com/static/;
			proxy_set_header Host "eu-assets.i.posthog.com";
			proxy_ssl_server_name on;
			proxy_buffer_size 4k;
			proxy_buffers 4 4k;
			proxy_hide_header 'Access-Control-Allow-Origin';
			add_header X-Frame-Options "SAMEORIGIN" always;
			add_header X-Content-Type-Options "nosniff" always;
			add_header 'Access-Control-Allow-Origin' '*' always;
		}

		location / {
			autoindex off;
			expires off;
			try_files $uri $uri/index.html =404;
		}
	}

	server {
		listen 8080;
		server_name alexandresanchez.xyz;
		return 301 https://alex73630.xyz$request_uri;
	}
}
